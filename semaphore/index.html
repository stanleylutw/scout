<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>童軍中文電碼快速查詢</title>
  <style>
    :root {
      --bg: #f6f7f3;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --accent: #2f6b3b;
      --accent-2: #dbe8dc;
      --warn: #8a5a00;
      --warn-bg: #fff4d6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 20px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,.04);
      margin-bottom: 16px;
    }
    h1 { font-size: 28px; margin: 0 0 8px; }
    h2 { font-size: 20px; margin: 0 0 10px; }
    .sub { color: var(--muted); font-size: 14px; }
    .pillbar { display:flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .pill {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
    }
    .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .grid { display:grid; grid-template-columns: 1.2fr .8fr; gap: 16px; }
    @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
    textarea, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      font-family: inherit;
      background: #fff;
    }
    textarea { min-height: 120px; resize: vertical; }
    .btns { display:flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    button {
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }
    button.secondary { background: #eef2f7; color: #111827; }
    button.warn { background: #9a6700; }
    .resultbox {
      background: #fbfbfb;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 12px;
      min-height: 100px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 16px;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border-bottom: 1px solid #eceff3; padding: 10px 8px; text-align: left; font-size: 15px; }
    th { color: var(--muted); font-weight: 700; }
    .small { font-size: 13px; color: var(--muted); }
    .notice { background: var(--warn-bg); color: var(--warn); border-radius: 12px; padding: 10px 12px; font-size: 14px; }
    .ok { color: var(--accent); font-weight: 700; }
    .muted { color: var(--muted); }
    .footer { font-size: 13px; color: var(--muted); }
    code { background:#f3f4f6; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>童軍中文電碼快速查詢</h1>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <h2>中文 → 電碼</h2>
          <div class="small">輸入任意文字；未收錄字會顯示為 <code>????</code>。</div>
          <textarea id="textInput" placeholder="例如：永平灰熊"></textarea>
          <div class="btns">
            <button id="btnEncode">查詢電碼</button>
            <button class="secondary" id="btnCopyCodes">複製整串電碼</button>
            <button class="secondary" id="btnClearText">清除</button>
          </div>
          <h3>查詢結果</h3>
          <div class="resultbox" id="codesOutput"></div>
          <table>
            <thead><tr><th>字元</th><th>電碼</th><th>狀態</th></tr></thead>
            <tbody id="charTable"></tbody>
          </table>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>電碼 → 中文</h2>
          <div class="small">輸入四碼，可用空白分隔多組，例如：<code>4547 6511 0957</code></div>
          <textarea id="codeInput" placeholder="例如：4547 6511 0957"></textarea>
          <div class="btns">
            <button id="btnDecode">反查中文</button>
            <button class="secondary" id="btnCopyText">複製文字</button>
            <button class="secondary" id="btnClearCode">清除</button>
          </div>
          <h3>反查結果</h3>
          <div class="resultbox" id="textOutput"></div>
          <table>
            <thead><tr><th>電碼</th><th>字元</th><th>狀態</th></tr></thead>
            <tbody id="codeTable"></tbody>
          </table>
        </div>

        <div class="card">
          <h2>版本與說明</h2>
          <div class="footer">© 2026 新北市永平灰熊複式童軍團. All rights reserved.</div>
        </div>
      </div>
    </div>
  </div>

const maps = {};

function parseRaw(raw) {
  const charToCode = new Map();
  const codeToChar = new Map();
  raw.split(/\n+/).forEach(line => {
    const m = line.match(/^(.)\s+(\d{4})$/u);
    if (!m) return;
    const ch = m[1];
    const code = m[2];
    if (!charToCode.has(ch)) charToCode.set(ch, code);
    if (!codeToChar.has(code)) codeToChar.set(code, ch);
  });
  return { charToCode, codeToChar };
}

for (const k of Object.keys(DATA_RAW)) {
  maps[k] = parseRaw(DATA_RAW[k]);
}

let currentSet = 'tw';

const pills = document.querySelectorAll('.pill');
const textInput = document.getElementById('textInput');
const codeInput = document.getElementById('codeInput');
const codesOutput = document.getElementById('codesOutput');
const textOutput = document.getElementById('textOutput');
const charTable = document.getElementById('charTable');
const codeTable = document.getElementById('codeTable');

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function setDataset(name) {
  currentSet = name;
  pills.forEach(p => p.classList.toggle('active', p.dataset.set === name));
  if (textInput.value.trim()) encodeText();
  if (codeInput.value.trim()) decodeCodes();
}

pills.forEach(p => p.addEventListener('click', () => setDataset(p.dataset.set)));

function encodeText() {
  const input = textInput.value;
  const { charToCode } = maps[currentSet];
  const rows = [];
  const allCodes = [];

  for (const ch of input) {
    if (ch === '\n') {
      rows.push(`<tr><td>↵</td><td></td><td class="muted">換行</td></tr>`);
      allCodes.push('\n');
      continue;
    }
    if (/\s/u.test(ch)) {
      rows.push(`<tr><td>空白</td><td></td><td class="muted">空格</td></tr>`);
      allCodes.push(' ');
      continue;
    }
    const code = charToCode.get(ch);
    if (code) {
      rows.push(`<tr><td>${escapeHtml(ch)}</td><td>${code}</td><td class="ok">已收錄</td></tr>`);
      allCodes.push(code);
    } else {
      rows.push(`<tr><td>${escapeHtml(ch)}</td><td>????</td><td class="muted">未收錄</td></tr>`);
      allCodes.push('????');
    }
  }

  const pretty = allCodes.join(' ').replace(/\s*\n\s*/g, '\n');
  codesOutput.textContent = pretty || '尚未輸入內容';
  charTable.innerHTML = rows.join('') || '<tr><td colspan="3" class="muted">尚無資料</td></tr>';
}

function decodeCodes() {
  const input = codeInput.value.trim();
  const { codeToChar } = maps[currentSet];
  const tokens = input.match(/\d{4}|\S+/g) || [];
  const rows = [];
  const out = [];

  tokens.forEach(tok => {
    if (!/^\d{4}$/.test(tok)) {
      rows.push(`<tr><td>${escapeHtml(tok)}</td><td>？</td><td class="muted">格式不是四碼</td></tr>`);
      out.push('？');
      return;
    }
    const ch = codeToChar.get(tok);
    if (ch) {
      rows.push(`<tr><td>${tok}</td><td>${escapeHtml(ch)}</td><td class="ok">已收錄</td></tr>`);
      out.push(ch);
    } else {
      rows.push(`<tr><td>${tok}</td><td>？</td><td class="muted">查無此碼</td></tr>`);
      out.push('？');
    }
  });

  textOutput.textContent = out.join('') || '尚未輸入內容';
  codeTable.innerHTML = rows.join('') || '<tr><td colspan="3" class="muted">尚無資料</td></tr>';
}

document.getElementById('btnEncode').addEventListener('click', encodeText);
document.getElementById('btnDecode').addEventListener('click', decodeCodes);
document.getElementById('btnClearText').addEventListener('click', () => { textInput.value=''; codesOutput.textContent=''; charTable.innerHTML=''; });
document.getElementById('btnClearCode').addEventListener('click', () => { codeInput.value=''; textOutput.textContent=''; codeTable.innerHTML=''; });

document.getElementById('btnCopyCodes').addEventListener('click', async () => {
  const txt = codesOutput.textContent || '';
  if (!txt) return;
  await navigator.clipboard.writeText(txt);
  alert('已複製電碼結果');
});

  const txt = textOutput.textContent || '';
  if (!txt) return;
  await navigator.clipboard.writeText(txt);
  alert('已複製文字結果');
});

const defaultText = '永平灰熊';

let textInputAutoCleared = false;
function clearDefaultTextOnce() {
  if (!textInputAutoCleared && textInput.value === defaultText) {
    textInput.value = '';
    textInputAutoCleared = true;
    encodeText();
  }
}

const defaultCode = '4547 6511 0957';
codeInput.value = defaultCode;

let codeInputAutoCleared = false;
function clearDefaultCodeOnce() {
  if (!codeInputAutoCleared && codeInput.value === defaultCode) {
    codeInput.value = '';
    codeInputAutoCleared = true;
    decodeCodes();
  }
}

codeInput.addEventListener('focus', clearDefaultCodeOnce, { once: true });
codeInput.addEventListener('pointerdown', clearDefaultCodeOnce, { once: true });
decodeCodes();
